<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debate Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b10;
      --surface: #13131c;
      --surface-2: #1a1a26;
      --border: #252535;
      --border-bright: #35354a;
      --text: #e2ddd4;
      --text-muted: #6b6b82;
      --text-dim: #3a3a50;
      --teal: #4ecdc4;
      --coral: #ff6b6b;
      --yellow: #ffe66d;
      --purple: #a78bfa;
      --gold: #f59e0b;
      --gold-dim: rgba(245,158,11,0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      font-size: 15px;
      line-height: 1.7;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 80px;
    }

    header {
      width: 100%;
      max-width: 860px;
      padding: 48px 0 32px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 56px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .logo-sep { flex: 1; height: 1px; background: var(--border); align-self: center; }

    .logo-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* ── Stage ── */
    #stage { width: 100%; max-width: 860px; }

    /* ── Intro ── */
    #intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 0;
      text-align: center;
    }

    .intro-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .intro-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 7vw, 80px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 16px;
    }

    .intro-title em {
      font-style: italic;
      color: var(--text-muted);
    }

    .intro-sub {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 480px;
      margin-bottom: 52px;
      font-style: italic;
    }

    .form-wrap {
      width: 100%;
      max-width: 660px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    #topic-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 18px;
      font-family: 'Lora', serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #topic-input::placeholder { color: var(--text-dim); }
    #topic-input:focus { border-color: var(--border-bright); }

    #start-btn {
      padding: 14px 28px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.15s;
    }

    #start-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    #start-btn:active { transform: translateY(0); }
    #start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Options row ── */
    .options-row {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .opt-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .opt-btns { display: flex; gap: 6px; }

    .opt-btn {
      height: 28px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .opt-btn:hover { border-color: var(--border-bright); color: var(--text); }

    .opt-btn.active {
      background: var(--surface-2);
      border-color: var(--border-bright);
      color: var(--text);
    }

    .opt-btn.active-teal {
      background: var(--surface-2);
      border-color: var(--teal);
      color: var(--teal);
    }

    .opt-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 2px;
    }

    .example-topics {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .example-chip {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .example-chip:hover {
      border-color: var(--border-bright);
      color: var(--text);
    }

    /* ── Arena ── */
    #arena { display: none; }

    .arena-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .arena-topic {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      font-style: italic;
      color: var(--text);
      flex: 1;
    }

    .arena-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 3px;
      white-space: nowrap;
    }

    /* ── Round divider ── */
    .round-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeSlideIn 0.4s ease forwards;
    }

    .round-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .round-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Conversation thread ── */
    .conversation-thread {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Turn card ── */
    .turn-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px 22px;
      border-left: 3px solid transparent;
      opacity: 0;
      animation: fadeSlideIn 0.35s ease forwards;
      transition: background 0.3s, box-shadow 0.3s, opacity 0.35s ease, filter 0.35s ease, transform 0.35s ease;
    }

    .turn-card.speaking {
      background: var(--surface-2);
      box-shadow: 0 0 0 1px var(--card-color, #fff) inset, 0 8px 32px rgba(0,0,0,0.3);
      transform: scale(1.008);
      position: relative;
      z-index: 1;
    }

    .turn-card.done { opacity: 0.82; }

    /* Dim non-speaking cards while one is active */
    .conversation-thread.has-active .turn-card:not(.speaking) {
      opacity: 0.28;
      filter: blur(0.5px);
      transform: scale(0.998);
    }

    .turn-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .turn-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }

    .turn-meta { flex: 1; min-width: 0; }

    .turn-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .turn-role {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .turn-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }

    .speaking .status-dot {
      background: currentColor;
      animation: blink-dot 0.8s ease infinite;
    }

    .turn-body {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--text-muted);
    }

    .turn-body.has-text { color: var(--text); }

    .cursor {
      display: inline-block;
      width: 2px; height: 14px;
      background: var(--text-muted);
      margin-left: 1px;
      vertical-align: middle;
      animation: blink-cursor 0.6s step-end infinite;
    }

    .cursor.hidden { display: none; }

    /* ── Judge section ── */
    #judge-section {
      margin-top: 48px;
      opacity: 0;
      animation: fadeSlideIn 0.5s ease forwards;
    }

    .judge-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .judge-title {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .judge-line { flex: 1; height: 1px; background: linear-gradient(to right, rgba(245,158,11,0.4), transparent); }

    .judge-card {
      background: var(--gold-dim);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
      border-left: 3px solid var(--gold);
      padding: 28px 32px;
    }

    .judge-verdict {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
    }

    .judge-verdict strong { color: var(--gold); font-weight: 500; }

    /* ── Status bar ── */
    #status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 16px;
      z-index: 100;
    }

    .status-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      flex: 1;
    }

    .progress-track {
      width: 120px; height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--text-muted);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 1px;
    }

    /* ── New debate button ── */
    #new-debate-btn {
      display: none;
      margin: 40px auto 0;
      padding: 12px 28px;
      background: transparent;
      border: 1px solid var(--border-bright);
      border-radius: 6px;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    #new-debate-btn:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Animations ── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <span class="logo">Debate Arena</span>
      <span class="logo-sep"></span>
      <span class="logo-tag">multi-agent · consensus synthesis</span>
    </header>

    <div id="stage">
      <!-- Intro / form -->
      <div id="intro">
        <div class="intro-eyebrow">Multi-Agent Intelligence</div>
        <h1 class="intro-title"><span id="agent-count-label">Four</span> Minds.<br><em>One Verdict.</em></h1>
        <p class="intro-sub">Enter any topic. Expert AI agents debate it in real time — then a Judge synthesizes the truth.</p>

        <div class="form-wrap">
          <div class="input-row">
            <input
              id="topic-input"
              type="text"
              placeholder="e.g. Should AI systems have legal personhood?"
              autocomplete="off"
            />
            <button id="start-btn">Begin →</button>
          </div>
          <div class="options-row">
            <span class="opt-label">Agents</span>
            <div class="opt-btns">
              <button class="opt-btn agent-opt" data-val="2">2</button>
              <button class="opt-btn agent-opt active" data-val="4">4</button>
            </div>
            <div class="opt-divider"></div>
            <span class="opt-label">Rounds</span>
            <div class="opt-btns">
              <button class="opt-btn round-opt" data-val="1">1</button>
              <button class="opt-btn round-opt active" data-val="2">2</button>
              <button class="opt-btn round-opt" data-val="3">3</button>
            </div>
            <div class="opt-divider"></div>
            <button id="shorter-toggle" class="opt-btn" title="Shorter agent responses">concise</button>
          </div>
        </div>

        <div class="example-topics">
          <button class="example-chip">AI replacing developers</button>
          <button class="example-chip">Open-sourcing LLMs</button>
          <button class="example-chip">Microservices vs. monoliths</button>
          <button class="example-chip">Universal basic income</button>
          <button class="example-chip">Regulating social media</button>
        </div>
      </div>

      <!-- Arena -->
      <div id="arena">
        <div class="arena-header">
          <div class="arena-topic" id="arena-topic"></div>
          <div class="arena-badge" id="arena-badge">preparing</div>
        </div>
        <div id="conversation-thread" class="conversation-thread"></div>
        <div id="judge-section" style="display:none"></div>
        <button id="new-debate-btn">← New debate</button>
      </div>
    </div>
  </div>

  <div id="status-bar">
    <span class="status-text" id="status-text">Ready.</span>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────
    const PERSONAS = {};
    let selectedRounds = 2;
    let selectedAgents = 4;
    let shortMode = false;
    let totalSteps = 0;
    let completedSteps = 0;
    let currentSource = null;
    let debateCompleted = false;
    let currentActiveCard = null; // { card, bodyEl, cursorEl, text }

    // ── Agent selector ─────────────────────────────────────────────────
    const agentLabels = { 2: 'Two', 4: 'Four' };

    document.querySelectorAll('.agent-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.agent-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAgents = parseInt(btn.dataset.val);
        document.getElementById('agent-count-label').textContent = agentLabels[selectedAgents] || 'Four';
      });
    });

    // ── Round selector ─────────────────────────────────────────────────
    document.querySelectorAll('.round-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.round-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRounds = parseInt(btn.dataset.val);
      });
    });

    // ── Shorter toggle ─────────────────────────────────────────────────
    document.getElementById('shorter-toggle').addEventListener('click', () => {
      shortMode = !shortMode;
      const btn = document.getElementById('shorter-toggle');
      btn.classList.toggle('active', shortMode);
      btn.classList.toggle('active-teal', shortMode);
      btn.classList.toggle('active', shortMode);
    });

    // ── Example chips ──────────────────────────────────────────────────
    document.querySelectorAll('.example-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.getElementById('topic-input').value = chip.textContent;
      });
    });

    // ── Start / reset ──────────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', startDebate);
    document.getElementById('topic-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') startDebate();
    });

    document.getElementById('new-debate-btn').addEventListener('click', () => {
      if (currentSource) { currentSource.close(); currentSource = null; }
      document.getElementById('arena').style.display = 'none';
      document.getElementById('intro').style.display = 'flex';
      document.getElementById('new-debate-btn').style.display = 'none';
      document.getElementById('conversation-thread').innerHTML = '';
      document.getElementById('judge-section').style.display = 'none';
      document.getElementById('judge-section').innerHTML = '';
      currentActiveCard = null;
      setStatus('Ready.');
      setProgress(0);
    });

    function startDebate() {
      const topic = document.getElementById('topic-input').value.trim();
      if (!topic) { shake(document.getElementById('topic-input')); return; }

      document.getElementById('intro').style.display = 'none';
      document.getElementById('arena').style.display = 'block';
      document.getElementById('arena-topic').textContent = `"${topic}"`;
      document.getElementById('arena-badge').textContent = 'connecting…';
      document.getElementById('conversation-thread').innerHTML = '';
      document.getElementById('judge-section').style.display = 'none';
      document.getElementById('new-debate-btn').style.display = 'none';
      currentActiveCard = null;
      debateCompleted = false;

      const url = `/api/debate?topic=${encodeURIComponent(topic)}&num_rounds=${selectedRounds}&num_agents=${selectedAgents}${shortMode ? '&short=true' : ''}`;
      currentSource = new EventSource(url);
      currentSource.onmessage = handleEvent;
      currentSource.onerror = () => {
        if (debateCompleted) return;
        const state = currentSource.readyState;
        setStatus(state === EventSource.CONNECTING
          ? 'Connection error — server unreachable or stream dropped.'
          : 'Connection error. Please try again.');
        document.getElementById('arena-badge').textContent = 'error';
        document.getElementById('new-debate-btn').style.display = 'block';
        currentSource.close();
      };
    }

    // ── Event handler ──────────────────────────────────────────────────
    function handleEvent(e) {
      const ev = JSON.parse(e.data);

      switch (ev.type) {
        case 'debate_start':
          ev.personas.forEach(p => { PERSONAS[p.id] = p; });
          totalSteps = ev.num_rounds * ev.personas.length + 1; // +1 for judge
          completedSteps = 0;
          document.getElementById('arena-badge').textContent = 'round 1 of ' + ev.num_rounds;
          setStatus('Debate starting…');
          setProgress(0);
          break;

        case 'round_start':
          document.getElementById('arena-badge').textContent = `round ${ev.round} of ${ev.total_rounds}`;
          addRoundHeader(ev.round, ev.total_rounds);
          break;

        case 'agent_start':
          createTurnCard(ev);
          setStatus(`${ev.persona_name} — ${ev.persona_role} is arguing…`);
          break;

        case 'agent_token':
          appendToken(ev.token);
          break;

        case 'agent_end':
          deactivateCurrentCard();
          completedSteps++;
          setProgress(completedSteps / totalSteps);
          break;

        case 'round_end':
          break;

        case 'judge_start':
          setStatus('Judge is synthesizing the verdict…');
          document.getElementById('arena-badge').textContent = 'verdict';
          showJudgeSection();
          break;

        case 'judge_token':
          appendJudgeToken(ev.token);
          break;

        case 'judge_end':
          hideJudgeCursor();
          completedSteps++;
          setProgress(1);
          break;

        case 'debate_end':
          debateCompleted = true;
          setStatus(`Debate complete — ${ev.total_arguments} argument${ev.total_arguments !== 1 ? 's' : ''} across ${selectedRounds} round${selectedRounds > 1 ? 's' : ''}.`);
          document.getElementById('arena-badge').textContent = 'complete';
          document.getElementById('new-debate-btn').style.display = 'block';
          currentSource.close();
          break;

        case 'error':
          setStatus('Error: ' + ev.message);
          document.getElementById('new-debate-btn').style.display = 'block';
          currentSource.close();
          break;
      }
    }

    // ── DOM helpers ────────────────────────────────────────────────────
    function addRoundHeader(round, total) {
      const thread = document.getElementById('conversation-thread');
      const header = document.createElement('div');
      header.className = 'round-header';
      header.style.marginTop = round === 1 ? '0' : '32px';
      header.innerHTML = `
        <span class="round-label">Round ${round}</span>
        <span class="round-line"></span>
      `;
      thread.appendChild(header);
    }

    function createTurnCard(ev) {
      const thread = document.getElementById('conversation-thread');
      const p = PERSONAS[ev.persona_id];
      if (!p) return;

      const uid = `turn-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
      const card = document.createElement('div');
      card.className = 'turn-card speaking';
      card.style.setProperty('--card-color', p.color);
      card.style.borderLeftColor = p.color;

      card.innerHTML = `
        <div class="turn-header">
          <div class="turn-avatar">${p.emoji}</div>
          <div class="turn-meta">
            <div class="turn-name">${p.name}</div>
            <div class="turn-role" style="color:${p.color}">${p.role}</div>
          </div>
          <div class="turn-status">
            <span class="status-dot" style="color:${p.color}"></span>
            <span class="status-label">speaking</span>
          </div>
        </div>
        <div class="turn-body" id="body-${uid}"><span class="cursor" id="cursor-${uid}"></span></div>
      `;

      thread.appendChild(card);
      thread.classList.add('has-active');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      currentActiveCard = {
        card,
        bodyEl: document.getElementById(`body-${uid}`),
        cursorEl: document.getElementById(`cursor-${uid}`),
        text: '',
      };
    }

    function appendToken(token) {
      if (!currentActiveCard) return;
      currentActiveCard.text += token;
      currentActiveCard.bodyEl.classList.add('has-text');
      currentActiveCard.bodyEl.textContent = currentActiveCard.text;
      currentActiveCard.bodyEl.appendChild(currentActiveCard.cursorEl);
    }

    function deactivateCurrentCard() {
      if (!currentActiveCard) return;
      const { card, cursorEl } = currentActiveCard;
      card.classList.remove('speaking');
      card.classList.add('done');
      card.querySelector('.status-label').textContent = 'done';
      cursorEl.classList.add('hidden');
      document.getElementById('conversation-thread').classList.remove('has-active');
      currentActiveCard = null;
    }

    // ── Judge ──────────────────────────────────────────────────────────
    let judgeBodyEl = null;
    let judgeCursorEl = null;
    let judgeText = '';

    function showJudgeSection() {
      const section = document.getElementById('judge-section');
      section.style.display = 'block';
      section.style.animation = 'none';
      section.offsetHeight; // reflow
      section.style.animation = 'fadeSlideIn 0.5s ease forwards';
      section.style.opacity = '0';

      section.innerHTML = `
        <div class="judge-header">
          <span class="judge-title">⚖ Judge's Verdict</span>
          <span class="judge-line"></span>
        </div>
        <div class="judge-card">
          <div class="judge-verdict" id="judge-body"><span class="cursor" id="judge-cursor"></span></div>
        </div>
      `;

      judgeBodyEl = document.getElementById('judge-body');
      judgeCursorEl = document.getElementById('judge-cursor');
      judgeText = '';
    }

    function appendJudgeToken(token) {
      if (!judgeBodyEl) return;
      judgeText += token;
      const rendered = judgeText
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '<br><br>');
      judgeBodyEl.innerHTML = rendered;
      judgeBodyEl.appendChild(judgeCursorEl);
    }

    function hideJudgeCursor() {
      if (judgeCursorEl) judgeCursorEl.classList.add('hidden');
    }

    // ── Utilities ──────────────────────────────────────────────────────
    function setStatus(msg) {
      document.getElementById('status-text').textContent = msg;
    }

    function setProgress(ratio) {
      document.getElementById('progress-fill').style.width = `${Math.min(ratio * 100, 100)}%`;
    }

    function shake(el) {
      el.style.borderColor = 'var(--coral)';
      setTimeout(() => { el.style.borderColor = ''; }, 800);
    }
  </script>
</body>
</html>
