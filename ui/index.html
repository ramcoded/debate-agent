<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debate Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b10;
      --surface: #13131c;
      --surface-2: #1a1a26;
      --border: #252535;
      --border-bright: #35354a;
      --text: #e2ddd4;
      --text-muted: #6b6b82;
      --text-dim: #3a3a50;
      --teal: #4ecdc4;
      --coral: #ff6b6b;
      --yellow: #ffe66d;
      --purple: #a78bfa;
      --gold: #f59e0b;
      --gold-dim: rgba(245,158,11,0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      font-size: 15px;
      line-height: 1.7;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 80px;
    }

    header {
      width: 100%;
      max-width: 860px;
      padding: 36px 0 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .logo-sep { flex: 1; height: 1px; background: var(--border); align-self: center; }

    .logo-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    #stage { width: 100%; max-width: 860px; }

    /* ── Intro ── */
    #intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 0;
      text-align: center;
    }

    .intro-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .intro-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 7vw, 80px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 16px;
    }

    .intro-title em { font-style: italic; color: var(--text-muted); }

    .intro-sub {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 480px;
      margin-bottom: 52px;
      font-style: italic;
    }

    .form-wrap {
      width: 100%;
      max-width: 660px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-row { display: flex; gap: 12px; width: 100%; }

    #topic-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 18px;
      font-family: 'Lora', serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #topic-input::placeholder { color: var(--text-dim); }
    #topic-input:focus { border-color: var(--border-bright); }

    #start-btn {
      padding: 14px 28px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.15s;
    }

    #start-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    #start-btn:active { transform: translateY(0); }
    #start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .options-row {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .opt-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .opt-btns { display: flex; gap: 6px; }

    .opt-btn {
      height: 28px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .opt-btn:hover { border-color: var(--border-bright); color: var(--text); }
    .opt-btn.active { background: var(--surface-2); border-color: var(--border-bright); color: var(--text); }
    .opt-btn.active-accent { background: var(--surface-2); border-color: var(--teal); color: var(--teal); }

    .opt-divider { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

    .example-topics {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .example-chip {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .example-chip:hover { border-color: var(--border-bright); color: var(--text); }

    /* ── Arena ── */
    #arena { display: none; flex-direction: column; gap: 0; }

    .arena-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .arena-topic {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      font-style: italic;
      color: var(--text);
      flex: 1;
    }

    .arena-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 3px;
      white-space: nowrap;
    }

    /* ── History ── */
    .dialogue-history {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 40px;
      max-height: 300px;
      overflow-y: auto;
      padding: 0 2px 18px;
      scroll-behavior: smooth;
    }

    .history-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0.45;
      flex-shrink: 0;
    }

    .history-divider-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .history-divider-line { flex: 1; height: 1px; background: var(--border); }

    .history-bubble {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 72%;
      opacity: 0;
      animation: bubbleAppear 0.32s ease forwards;
      flex-shrink: 0;
    }

    .history-bubble.side-left  { align-self: flex-start; }
    .history-bubble.side-right { align-self: flex-end; text-align: right; }

    .bubble-header {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bubble-color, var(--text-dim));
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .history-bubble.side-right .bubble-header { flex-direction: row-reverse; }

    .bubble-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-muted);
    }

    .history-bubble.side-left  .bubble-body { border-left:  2px solid var(--bubble-color, var(--border)); border-radius: 2px 8px 8px 8px; }
    .history-bubble.side-right .bubble-body { border-right: 2px solid var(--bubble-color, var(--border)); border-radius: 8px 2px 8px 8px; }

    /* ── Portrait stage ── */
    .portrait-stage {
      display: flex;
      align-items: flex-end;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      margin-top: 4px;
      min-height: 148px;
      position: relative;
    }

    /* subtle scanline texture for game feel */
    .portrait-stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.008) 3px,
        rgba(255,255,255,0.008) 4px
      );
      pointer-events: none;
    }

    .portrait-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .portrait-side-left  { align-items: flex-start; padding-left: 8px; }
    .portrait-side-right { align-items: flex-end;   padding-right: 8px; }

    .stage-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 14px 14px;
      gap: 6px;
      flex-shrink: 0;
    }

    .vs-text {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 900;
      font-style: italic;
      color: var(--text-dim);
      letter-spacing: 0.12em;
    }

    .round-pip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* ── Portrait card ── */
    .portrait-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px 10px 12px;
      border-radius: 7px;
      border: 1px solid transparent;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.3s ease, background 0.3s ease, box-shadow 0.35s ease;
    }

    .portrait-side-right .portrait-card { flex-direction: row-reverse; padding: 10px 12px 10px 14px; }

    .portrait-card.inactive {
      opacity: 0.22;
      transform: scale(0.93) translateY(4px);
    }

    .portrait-card.active {
      opacity: 1;
      transform: scale(1) translateY(0);
      border-color: var(--pcolor, var(--border-bright));
      background: rgba(255,255,255,0.025);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset,
                  0 8px 32px rgba(0,0,0,0.4);
    }

    .p-emoji-wrap {
      font-size: 44px;
      line-height: 1;
      flex-shrink: 0;
      transition: transform 0.35s ease;
    }

    .portrait-card.active .p-emoji-wrap {
      animation: portraitBob 0.65s ease-in-out infinite alternate;
    }

    .p-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .portrait-side-right .p-info { align-items: flex-end; }

    .p-name {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
    }

    .p-role {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .p-speaking {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .portrait-card.active .p-speaking { opacity: 1; }
    .portrait-side-right .p-speaking   { flex-direction: row-reverse; }

    .p-speak-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--pcolor);
      animation: blinkDot 0.72s ease infinite;
    }

    .p-speak-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Game dialogue box ── */
    .game-dialogue-wrap {
      border-bottom: 1px solid var(--border);
    }

    .game-dialogue-box {
      background: var(--surface-2);
      border-left:  1px solid var(--border-bright);
      border-right: 1px solid var(--border-bright);
      border-bottom: 1px solid var(--border-bright);
      border-top: 3px solid var(--dcolor, var(--border-bright));
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      animation: dialogueSlideUp 0.26s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .game-dialogue-box.closing {
      animation: dialogueFadeOut 0.22s ease forwards;
    }

    .dialogue-nameplate {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 18px 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.28);
    }

    .np-emoji { font-size: 17px; line-height: 1; }

    .np-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
    }

    .np-sep { color: var(--text-dim); font-size: 12px; margin: 0 1px; }

    .np-role {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .np-dots {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ndot {
      width: 5px; height: 5px;
      border-radius: 50%;
      animation: blinkDot 0.8s ease infinite;
    }

    .ndot:nth-child(2) { animation-delay: 0.18s; }
    .ndot:nth-child(3) { animation-delay: 0.36s; }

    .dialogue-body {
      padding: 15px 20px 18px;
      font-family: 'Lora', serif;
      font-size: 15.5px;
      line-height: 1.8;
      color: var(--text);
      min-height: 88px;
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 2px; height: 15px;
      background: var(--text-muted);
      margin-left: 2px;
      vertical-align: middle;
      animation: blinkCursor 0.55s step-end infinite;
    }
    .cursor.hidden { display: none; }

    /* reading-pause indicator — blinking ▼ at end of text */
    .read-indicator {
      display: inline-block;
      margin-left: 7px;
      color: var(--text-dim);
      font-size: 11px;
      vertical-align: middle;
      animation: blinkCursor 0.65s step-end infinite;
      user-select: none;
    }

    /* dialogue box dims slightly while reader catches up */
    .game-dialogue-box.reading .dialogue-body {
      color: var(--text-muted);
      transition: color 0.4s ease;
    }

    /* ── Judge section ── */
    #judge-section {
      margin-top: 40px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .judge-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .judge-title {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .judge-line { flex: 1; height: 1px; background: linear-gradient(to right, rgba(245,158,11,0.4), transparent); }

    .judge-card {
      background: var(--gold-dim);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
      border-left: 3px solid var(--gold);
      padding: 26px 30px;
    }

    .judge-verdict { font-size: 15px; line-height: 1.82; color: var(--text); }
    .judge-verdict strong { color: var(--gold); font-weight: 500; }

    /* ── Status bar ── */
    #status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 16px;
      z-index: 100;
    }

    .status-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      flex: 1;
    }

    .progress-track { width: 120px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--text-muted); width: 0%; transition: width 0.4s ease; border-radius: 1px; }

    #sound-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.45;
      padding: 0;
      transition: opacity 0.15s;
      line-height: 1;
    }

    #sound-btn:hover { opacity: 0.9; }
    #sound-btn.muted { opacity: 0.18; }

    /* ── New debate button ── */
    #new-debate-btn {
      display: none;
      margin: 36px auto 0;
      padding: 12px 28px;
      background: transparent;
      border: 1px solid var(--border-bright);
      border-radius: 6px;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    #new-debate-btn:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── OBJECTION overlay ── */
    #objection-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 999;
    }

    .objection-word {
      font-family: 'Playfair Display', serif;
      font-size: clamp(58px, 10vw, 108px);
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.02em;
      opacity: 0;
      user-select: none;
      display: none;
    }

    .objection-word.bang {
      display: block;
      animation: pwBang 1.05s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bubbleAppear {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes dialogueSlideUp {
      0%   { opacity: 0; transform: translateY(18px) scaleY(0.94); transform-origin: bottom; }
      60%  { transform: translateY(-2px) scaleY(1.01); }
      100% { opacity: 1; transform: translateY(0) scaleY(1); }
    }

    @keyframes dialogueFadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(10px); }
    }

    @keyframes portraitBob {
      from { transform: translateY(0px); }
      to   { transform: translateY(-8px); }
    }

    @keyframes blinkCursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes blinkDot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.18; }
    }

    @keyframes pwBang {
      0%   { opacity: 0;   transform: scale(0.12) rotate(-14deg); filter: blur(6px); }
      22%  { opacity: 1;   transform: scale(1.22) rotate(-2deg);  filter: blur(0); }
      42%  { transform: scale(0.97) rotate(0deg); }
      68%  { opacity: 1;   transform: scale(1) rotate(0deg); }
      100% { opacity: 0;   transform: scale(0.93) rotate(1deg); }
    }
  </style>
</head>
<body>
  <div id="objection-overlay">
    <span class="objection-word" id="objection-word">OBJECTION!</span>
  </div>

  <div class="page">
    <header>
      <span class="logo">Debate Arena</span>
      <span class="logo-sep"></span>
      <span class="logo-tag">multi-agent · consensus synthesis</span>
    </header>

    <div id="stage">
      <!-- ── Intro ── -->
      <div id="intro">
        <div class="intro-eyebrow">Multi-Agent Intelligence</div>
        <h1 class="intro-title"><span id="agent-count-label">Four</span> Minds.<br><em>One Verdict.</em></h1>
        <p class="intro-sub">Enter any topic. Expert AI agents debate it in real time — then a Judge synthesizes the truth.</p>

        <div class="form-wrap">
          <div class="input-row">
            <input id="topic-input" type="text"
              placeholder="e.g. Should AI systems have legal personhood?"
              autocomplete="off" />
            <button id="start-btn">Begin →</button>
          </div>
          <div class="options-row">
            <span class="opt-label">Agents</span>
            <div class="opt-btns">
              <button class="opt-btn agent-opt" data-val="2">2</button>
              <button class="opt-btn agent-opt active" data-val="4">4</button>
            </div>
            <div class="opt-divider"></div>
            <span class="opt-label">Rounds</span>
            <div class="opt-btns">
              <button class="opt-btn round-opt" data-val="1">1</button>
              <button class="opt-btn round-opt active" data-val="2">2</button>
              <button class="opt-btn round-opt" data-val="3">3</button>
            </div>
            <div class="opt-divider"></div>
            <button id="shorter-toggle" class="opt-btn" title="Shorter responses">concise</button>
          </div>
        </div>

        <div class="example-topics">
          <button class="example-chip">AI replacing developers</button>
          <button class="example-chip">Open-sourcing LLMs</button>
          <button class="example-chip">Microservices vs. monoliths</button>
          <button class="example-chip">Universal basic income</button>
          <button class="example-chip">Regulating social media</button>
        </div>
      </div>

      <!-- ── Arena ── -->
      <div id="arena">
        <div class="arena-header">
          <div class="arena-topic" id="arena-topic"></div>
          <div class="arena-badge" id="arena-badge">preparing</div>
        </div>

        <!-- History of completed turns -->
        <div id="dialogue-history" class="dialogue-history"></div>

        <!-- Character portrait stage -->
        <div class="portrait-stage" id="portrait-stage">
          <div class="portrait-side portrait-side-left"  id="portraits-left"></div>
          <div class="stage-center">
            <span class="vs-text">VS</span>
            <span class="round-pip" id="round-pip">—</span>
          </div>
          <div class="portrait-side portrait-side-right" id="portraits-right"></div>
        </div>

        <!-- Active game dialogue box -->
        <div class="game-dialogue-wrap" id="game-dialogue-wrap" style="display:none"></div>

        <!-- Judge section -->
        <div id="judge-section" style="display:none"></div>

        <button id="new-debate-btn">← New debate</button>
      </div>
    </div>
  </div>

  <div id="status-bar">
    <span class="status-text" id="status-text">Ready.</span>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <button id="sound-btn" title="Toggle typing sounds">🔊</button>
  </div>

  <script>
    // ── App state ──────────────────────────────────────────────────────
    const PERSONAS = {};
    const personaSide = {};   // persona_id → 'left' | 'right'
    let selectedRounds = 2;
    let selectedAgents = 4;
    let shortMode = false;
    let totalSteps = 0;
    let completedSteps = 0;
    let currentSource = null;
    let debateCompleted = false;
    let currentActiveCard = null;
    let speakersThisDebate = 0;

    // ── Reading-pause queue ────────────────────────────────────────────
    let pendingEvents    = [];
    let processingPaused = false;
    let skipFn           = null;   // called on click-to-skip
    let dialogueClearTimer = null; // tracks the post-close wrap-clear timeout

    // ── Typewriter state ───────────────────────────────────────────────
    let typeQueue     = '';
    let typeDisplayed = '';
    let typeTimeout   = null;
    let typingActive  = false;

    const T_CHAR  = 26;
    const T_SPACE = 7;
    const T_COMMA = 105;
    const T_STOP  = 340;

    function startTyping() {
      typeQueue     = '';
      typeDisplayed = '';
      typingActive  = true;
      clearTimeout(typeTimeout);
      typeStep();
    }

    function typeStep() {
      if (!typingActive || !currentActiveCard) return;
      if (typeQueue.length === 0) { typeTimeout = setTimeout(typeStep, 12); return; }

      const ch = typeQueue[0];
      typeQueue     = typeQueue.slice(1);
      typeDisplayed += ch;

      const body = currentActiveCard.bodyEl;
      const cur  = currentActiveCard.cursorEl;
      body.textContent = typeDisplayed;
      body.appendChild(cur);

      if (ch !== ' ' && ch !== '\n') {
        cur.style.opacity = '0';
        requestAnimationFrame(() => { if (cur) cur.style.opacity = '1'; });
        playBlip('.?!…'.includes(ch));
      }

      let delay = T_CHAR;
      if (ch === ' ' || ch === '\n') delay = T_SPACE;
      else if ('.?!…'.includes(ch))  delay = T_STOP;
      else if (',;:'.includes(ch))   delay = T_COMMA;

      typeTimeout = setTimeout(typeStep, delay);
    }

    function flushTyping() {
      typingActive = false;
      clearTimeout(typeTimeout);
      if (currentActiveCard && typeQueue.length > 0) {
        typeDisplayed += typeQueue;
        typeQueue = '';
        const body = currentActiveCard.bodyEl;
        const cur  = currentActiveCard.cursorEl;
        body.textContent = typeDisplayed;
        body.appendChild(cur);
      }
    }

    // ── Audio ──────────────────────────────────────────────────────────
    let audioCtx = null;
    let soundOn  = true;

    function initAudio() {
      if (audioCtx) return;
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }

    function playBlip(isStop = false) {
      if (!soundOn || !audioCtx) return;
      try {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'square';
        osc.frequency.value = isStop ? 380 : 500 + Math.random() * 60;
        gain.gain.setValueAtTime(0.018, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.038);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.038);
      } catch(e) {}
    }

    document.getElementById('game-dialogue-wrap').addEventListener('click', () => {
      if (skipFn) { const fn = skipFn; skipFn = null; fn(); }
    });

    document.getElementById('sound-btn').addEventListener('click', () => {
      soundOn = !soundOn;
      const btn = document.getElementById('sound-btn');
      btn.textContent = soundOn ? '🔊' : '🔇';
      btn.classList.toggle('muted', !soundOn);
    });

    // ── Options ────────────────────────────────────────────────────────
    document.querySelectorAll('.agent-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.agent-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAgents = parseInt(btn.dataset.val);
        document.getElementById('agent-count-label').textContent =
          ({ 2: 'Two', 4: 'Four' })[selectedAgents] || 'Four';
      });
    });

    document.querySelectorAll('.round-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.round-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRounds = parseInt(btn.dataset.val);
      });
    });

    document.getElementById('shorter-toggle').addEventListener('click', () => {
      shortMode = !shortMode;
      document.getElementById('shorter-toggle').classList.toggle('active', shortMode);
      document.getElementById('shorter-toggle').classList.toggle('active-accent', shortMode);
    });

    document.querySelectorAll('.example-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.getElementById('topic-input').value = chip.textContent;
      });
    });

    // ── Start / reset ──────────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', startDebate);
    document.getElementById('topic-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') startDebate();
    });

    document.getElementById('new-debate-btn').addEventListener('click', () => {
      if (currentSource) { currentSource.close(); currentSource = null; }
      flushTyping();
      document.getElementById('arena').style.display = 'none';
      document.getElementById('intro').style.display = 'flex';
      document.getElementById('new-debate-btn').style.display = 'none';
      document.getElementById('dialogue-history').innerHTML = '';
      document.getElementById('portraits-left').innerHTML = '';
      document.getElementById('portraits-right').innerHTML = '';
      document.getElementById('game-dialogue-wrap').style.display = 'none';
      document.getElementById('game-dialogue-wrap').innerHTML = '';
      document.getElementById('judge-section').style.display = 'none';
      document.getElementById('judge-section').innerHTML = '';
      document.getElementById('round-pip').textContent = '—';
      currentActiveCard = null;
      speakersThisDebate = 0;
      skipFn = null;
      clearTimeout(dialogueClearTimer); dialogueClearTimer = null;
      pendingEvents = []; processingPaused = false;
      setStatus('Ready.');
      setProgress(0);
    });

    function startDebate() {
      const topic = document.getElementById('topic-input').value.trim();
      if (!topic) { shake(document.getElementById('topic-input')); return; }

      initAudio();

      document.getElementById('intro').style.display = 'none';
      document.getElementById('arena').style.display = 'flex';
      document.getElementById('arena-topic').textContent = `"${topic}"`;
      document.getElementById('arena-badge').textContent = 'connecting…';
      document.getElementById('dialogue-history').innerHTML = '';
      document.getElementById('portraits-left').innerHTML = '';
      document.getElementById('portraits-right').innerHTML = '';
      document.getElementById('game-dialogue-wrap').style.display = 'none';
      document.getElementById('game-dialogue-wrap').innerHTML = '';
      document.getElementById('judge-section').style.display = 'none';
      document.getElementById('new-debate-btn').style.display = 'none';
      document.getElementById('round-pip').textContent = '—';
      currentActiveCard = null;
      speakersThisDebate = 0;
      debateCompleted = false;
      skipFn = null;
      clearTimeout(dialogueClearTimer); dialogueClearTimer = null;
      pendingEvents = []; processingPaused = false;

      const url = `/api/debate?topic=${encodeURIComponent(topic)}&num_rounds=${selectedRounds}&num_agents=${selectedAgents}${shortMode ? '&short=true' : ''}`;
      currentSource = new EventSource(url);
      currentSource.onmessage = handleEvent;
      currentSource.onerror = () => {
        if (debateCompleted) return;
        setStatus(currentSource.readyState === EventSource.CONNECTING
          ? 'Connection error — server unreachable or stream dropped.'
          : 'Connection error. Please try again.');
        document.getElementById('arena-badge').textContent = 'error';
        document.getElementById('new-debate-btn').style.display = 'block';
        currentSource.close();
      };
    }

    // ── SSE event handler ──────────────────────────────────────────────
    function handleEvent(e) {
      const ev = JSON.parse(e.data);
      // Buffer all events while a reading pause is active, except hard stops
      if (processingPaused && ev.type !== 'debate_start' && ev.type !== 'debate_end' && ev.type !== 'error') {
        pendingEvents.push(ev);
        return;
      }
      processEvent(ev);
    }

    function resumeEventProcessing() {
      processingPaused = false;
      while (pendingEvents.length > 0 && !processingPaused) {
        processEvent(pendingEvents.shift());
      }
    }

    // Slow-drain any remaining typeQueue chars, then hold for reading, then call onDone
    function slowFlushThenPause(onDone) {
      typingActive = false;
      clearTimeout(typeTimeout);

      const SLOW = 42;

      // Click-to-skip during slow drain: flush instantly then go to reading indicator
      skipFn = () => {
        clearTimeout(typeTimeout);
        if (typeQueue.length > 0 && currentActiveCard) {
          typeDisplayed += typeQueue;
          typeQueue = '';
          const { bodyEl, cursorEl } = currentActiveCard;
          bodyEl.textContent = typeDisplayed;
          bodyEl.appendChild(cursorEl);
        }
        skipFn = null;
        showReadingIndicator(onDone);
      };

      function drain() {
        if (!currentActiveCard) { skipFn = null; onDone(); return; }
        if (typeQueue.length === 0) {
          skipFn = null;
          showReadingIndicator(onDone);
          return;
        }
        const ch = typeQueue[0];
        typeQueue     = typeQueue.slice(1);
        typeDisplayed += ch;

        const { bodyEl, cursorEl } = currentActiveCard;
        bodyEl.textContent = typeDisplayed;
        bodyEl.appendChild(cursorEl);
        playBlip('.?!…'.includes(ch));

        let delay = SLOW;
        if ('.?!…'.includes(ch)) delay = SLOW * 5;
        else if (',;:'.includes(ch)) delay = SLOW * 2.5;
        typeTimeout = setTimeout(drain, delay);
      }

      drain();
    }

    function showReadingIndicator(onDone) {
      if (!currentActiveCard) { onDone(); return; }
      const { boxEl, bodyEl, cursorEl } = currentActiveCard;

      cursorEl.classList.add('hidden');
      const ind = document.createElement('span');
      ind.className = 'read-indicator';
      ind.textContent = ' ▼';
      bodyEl.appendChild(ind);

      boxEl.classList.add('reading');
      boxEl.querySelectorAll('.ndot').forEach(d => { d.style.animation = 'none'; d.style.opacity = '0.15'; });

      setStatus('Click dialogue to continue · reading…');

      const words = typeDisplayed.trim().split(/\s+/).length;
      const hold  = Math.max(2200, Math.min(words * 160, 6000));
      const timer = setTimeout(onDone, hold);

      // Click-to-skip during reading pause
      skipFn = () => {
        clearTimeout(timer);
        skipFn = null;
        onDone();
      };
    }

    function processEvent(ev) {

      switch (ev.type) {

        case 'debate_start':
          ev.personas.forEach(p => { PERSONAS[p.id] = p; });
          totalSteps   = ev.num_rounds * ev.personas.length + 1;
          completedSteps = 0;
          document.getElementById('arena-badge').textContent = 'round 1 of ' + ev.num_rounds;
          setStatus('Debate starting…');
          setProgress(0);
          setupPortraitStage(ev.personas);
          break;

        case 'round_start':
          document.getElementById('arena-badge').textContent = `round ${ev.round} of ${ev.total_rounds}`;
          document.getElementById('round-pip').textContent   = `round ${ev.round}`;
          addHistoryDivider(`Round ${ev.round}`);
          break;

        case 'agent_start': {
          speakersThisDebate++;
          setStatus(`${ev.persona_name} — ${ev.persona_role} is arguing…`);
          const banner = pickBanner(ev.persona_id, ev.round);
          if (banner) flashBanner(banner);
          showGameDialogue(ev);
          break;
        }

        case 'agent_token':
          typeQueue += ev.token;
          break;

        case 'agent_end':
          processingPaused = true;
          slowFlushThenPause(() => {
            closeDialogueAndArchive();
            completedSteps++;
            setProgress(completedSteps / totalSteps);
            resumeEventProcessing();
          });
          break;

        case 'round_end':
          break;

        case 'judge_start':
          setStatus('Judge is synthesizing the verdict…');
          document.getElementById('arena-badge').textContent = 'verdict';
          document.getElementById('portrait-stage').style.display = 'none';
          document.getElementById('game-dialogue-wrap').style.display = 'none';
          showJudgeSection();
          break;

        case 'judge_token':
          appendJudgeToken(ev.token);
          break;

        case 'judge_end':
          hideJudgeCursor();
          completedSteps++;
          setProgress(1);
          break;

        case 'debate_end':
          debateCompleted = true;
          setStatus(`Debate complete — ${ev.total_arguments} argument${ev.total_arguments !== 1 ? 's' : ''} across ${selectedRounds} round${selectedRounds > 1 ? 's' : ''}.`);
          document.getElementById('arena-badge').textContent = 'complete';
          document.getElementById('new-debate-btn').style.display = 'block';
          currentSource.close();
          break;

        case 'error':
          setStatus('Error: ' + ev.message);
          document.getElementById('new-debate-btn').style.display = 'block';
          currentSource.close();
          break;
      }
    }

    // ── Portrait stage setup ───────────────────────────────────────────
    function setupPortraitStage(personas) {
      const leftEl  = document.getElementById('portraits-left');
      const rightEl = document.getElementById('portraits-right');
      leftEl.innerHTML  = '';
      rightEl.innerHTML = '';

      personas.forEach((p, i) => {
        const side = i % 2 === 0 ? 'left' : 'right';
        personaSide[p.id] = side;
        const container = side === 'left' ? leftEl : rightEl;

        const card = document.createElement('div');
        card.className = 'portrait-card inactive';
        card.id = `portrait-${p.id}`;
        card.style.setProperty('--pcolor', p.color);
        card.innerHTML = `
          <div class="p-emoji-wrap">${p.emoji}</div>
          <div class="p-info">
            <div class="p-name">${p.name}</div>
            <div class="p-role" style="color:${p.color}">${p.role}</div>
            <div class="p-speaking">
              <span class="p-speak-dot" style="background:${p.color}"></span>
              <span class="p-speak-label">speaking</span>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function activatePortrait(personaId) {
      document.querySelectorAll('.portrait-card').forEach(el => {
        el.classList.remove('active');
        el.classList.add('inactive');
      });
      const el = document.getElementById(`portrait-${personaId}`);
      if (el) { el.classList.remove('inactive'); el.classList.add('active'); }
    }

    function dimAllPortraits() {
      document.querySelectorAll('.portrait-card').forEach(el => {
        el.classList.remove('active');
        el.classList.add('inactive');
      });
    }

    // ── Game dialogue box ──────────────────────────────────────────────
    function showGameDialogue(ev) {
      const p = PERSONAS[ev.persona_id];
      if (!p) return;

      // Cancel any pending wrap-clear from the previous turn's close animation
      clearTimeout(dialogueClearTimer);
      skipFn = null;

      activatePortrait(ev.persona_id);

      const wrap = document.getElementById('game-dialogue-wrap');
      wrap.style.display = 'block';

      const uid = `d${Date.now().toString(36)}`;
      wrap.innerHTML = `
        <div class="game-dialogue-box" id="gdb-${uid}" style="--dcolor:${p.color}">
          <div class="dialogue-nameplate">
            <span class="np-emoji">${p.emoji}</span>
            <span class="np-name" style="color:${p.color}">${p.name}</span>
            <span class="np-sep">·</span>
            <span class="np-role">${p.role}</span>
            <span class="np-dots">
              <span class="ndot" style="background:${p.color}"></span>
              <span class="ndot" style="background:${p.color}"></span>
              <span class="ndot" style="background:${p.color}"></span>
            </span>
          </div>
          <div class="dialogue-body" id="db-${uid}"><span class="cursor" id="dc-${uid}"></span></div>
        </div>
      `;

      currentActiveCard = {
        boxEl:    document.getElementById(`gdb-${uid}`),
        bodyEl:   document.getElementById(`db-${uid}`),
        cursorEl: document.getElementById(`dc-${uid}`),
        personaId:    ev.persona_id,
        personaColor: p.color,
        personaName:  p.name,
        personaEmoji: p.emoji,
        personaRole:  p.role,
      };

      startTyping();
      setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
    }

    function closeDialogueAndArchive() {
      if (!currentActiveCard) return;

      const { boxEl, cursorEl, personaId, personaColor, personaName, personaEmoji } = currentActiveCard;
      const text = typeDisplayed;
      const side = personaSide[personaId] || 'left';

      cursorEl.classList.add('hidden');

      // Slide out the dialogue box
      boxEl.classList.add('closing');

      // Add to history
      addHistoryBubble({ text, side, personaColor, personaName, personaEmoji });

      dialogueClearTimer = setTimeout(() => {
        const wrap = document.getElementById('game-dialogue-wrap');
        wrap.style.display = 'none';
        wrap.innerHTML = '';
        dialogueClearTimer = null;
      }, 240);

      skipFn = null;
      dimAllPortraits();
      currentActiveCard = null;
    }

    // ── History bubbles ────────────────────────────────────────────────
    function addHistoryDivider(label) {
      const history = document.getElementById('dialogue-history');
      const div = document.createElement('div');
      div.className = 'history-divider';
      div.innerHTML = `
        <span class="history-divider-label">${label}</span>
        <span class="history-divider-line"></span>
      `;
      history.appendChild(div);
      history.scrollTop = history.scrollHeight;
    }

    function addHistoryBubble({ text, side, personaColor, personaName, personaEmoji }) {
      const history = document.getElementById('dialogue-history');
      const bubble  = document.createElement('div');
      bubble.className = `history-bubble side-${side}`;
      bubble.style.setProperty('--bubble-color', personaColor);

      bubble.innerHTML = `
        <div class="bubble-header">
          <span>${personaEmoji}</span>
          <span>${personaName}</span>
        </div>
        <div class="bubble-body">${escapeHtml(text)}</div>
      `;

      history.appendChild(bubble);
      setTimeout(() => { history.scrollTop = history.scrollHeight; }, 50);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    // ── OBJECTION banner ───────────────────────────────────────────────
    const BANNERS = {
      objection: { text: 'OBJECTION!',  color: '#ff3030', shadow: '4px 4px 0 #880000' },
      holdit:    { text: 'HOLD IT!',    color: '#ffe66d', shadow: '4px 4px 0 #665500' },
      takethat:  { text: 'TAKE THAT!',  color: '#4ecdc4', shadow: '4px 4px 0 #1a6660' },
    };

    function pickBanner(personaId, round) {
      if (speakersThisDebate === 0) return null;
      if (personaId === 'devil')    return 'objection';
      if (round > 1)                return personaId === 'visionary' ? 'takethat' : 'holdit';
      return 'holdit';
    }

    let bannerTimer = null;
    function flashBanner(type) {
      const cfg = BANNERS[type];
      if (!cfg) return;
      const el = document.getElementById('objection-word');
      el.textContent      = cfg.text;
      el.style.color      = cfg.color;
      el.style.textShadow = cfg.shadow;
      el.classList.remove('bang');
      el.offsetHeight;
      el.classList.add('bang');
      clearTimeout(bannerTimer);
      bannerTimer = setTimeout(() => el.classList.remove('bang'), 1100);
    }

    // ── Judge ──────────────────────────────────────────────────────────
    let judgeBodyEl = null, judgeCursorEl = null, judgeText = '';

    function showJudgeSection() {
      const sec = document.getElementById('judge-section');
      sec.style.display   = 'block';
      sec.style.animation = 'none';
      sec.offsetHeight;
      sec.style.opacity   = '0';
      sec.style.animation = 'fadeUp 0.5s ease forwards';
      sec.innerHTML = `
        <div class="judge-header">
          <span class="judge-title">⚖ Judge's Verdict</span>
          <span class="judge-line"></span>
        </div>
        <div class="judge-card">
          <div class="judge-verdict" id="judge-body"><span class="cursor" id="judge-cursor"></span></div>
        </div>
      `;
      judgeBodyEl   = document.getElementById('judge-body');
      judgeCursorEl = document.getElementById('judge-cursor');
      judgeText = '';
    }

    function appendJudgeToken(token) {
      if (!judgeBodyEl) return;
      judgeText += token;
      judgeBodyEl.innerHTML = judgeText
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '<br><br>');
      judgeBodyEl.appendChild(judgeCursorEl);
    }

    function hideJudgeCursor() {
      if (judgeCursorEl) judgeCursorEl.classList.add('hidden');
    }

    // ── Utilities ──────────────────────────────────────────────────────
    function setStatus(msg) { document.getElementById('status-text').textContent = msg; }
    function setProgress(r) { document.getElementById('progress-fill').style.width = `${Math.min(r * 100, 100)}%`; }
    function shake(el) {
      el.style.borderColor = 'var(--coral)';
      setTimeout(() => { el.style.borderColor = ''; }, 800);
    }
  </script>
</body>
</html>
